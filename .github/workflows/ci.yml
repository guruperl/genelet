name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          check-latest: true
      - name: Test
        run: GOWORK=off go test ./...
      - name: Vet
        run: GOWORK=off go vet ./...
      - name: Race
        run: GOWORK=off go test -race ./...
      - name: Vulnerability scan
        run: GOWORK=off GOTOOLCHAIN=go1.26.3 go run golang.org/x/vuln/cmd/govulncheck@latest ./...
